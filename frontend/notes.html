<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>내 노트 — STU</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --accent: #7c6af7;
      --accent-dim: #4e46a0;
      --text: #e2e4f0;
      --muted: #7b7f96;
      --danger: #e05c5c;
      --tag-bg: #252840;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }

    /* ── Layout ── */
    .app { display: flex; height: 100vh; overflow: hidden; }

    /* ── Sidebar ── */
    .sidebar {
      width: 300px;
      min-width: 300px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 20px 16px 12px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-header h1 {
      font-size: 15px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: .4px;
      margin-bottom: 12px;
    }

    .search-box {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--text);
      font-size: 13px;
      outline: none;
      transition: border-color .15s;
    }
    .search-box:focus { border-color: var(--accent); }
    .search-box::placeholder { color: var(--muted); }

    .new-btn {
      width: 100%;
      margin-top: 10px;
      padding: 8px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    .new-btn:hover { background: var(--accent-dim); }

    /* ── Note list ── */
    .note-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }
    .note-list::-webkit-scrollbar { width: 4px; }
    .note-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .note-item {
      padding: 12px 16px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background .1s, border-color .1s;
    }
    .note-item:hover { background: rgba(124,106,247,.08); }
    .note-item.active {
      background: rgba(124,106,247,.14);
      border-left-color: var(--accent);
    }

    .note-item-title {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }

    .note-item-meta {
      font-size: 11px;
      color: var(--muted);
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .note-item-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 5px; }
    .tag {
      background: var(--tag-bg);
      color: var(--accent);
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .empty-state {
      padding: 40px 16px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    /* ── Editor panel ── */
    .editor-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .editor-toolbar {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
    }

    .title-input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 18px;
      font-weight: 600;
      outline: none;
    }
    .title-input::placeholder { color: var(--muted); }

    .toolbar-actions { display: flex; gap: 8px; align-items: center; }

    .btn {
      padding: 6px 14px;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }
    .btn-save { background: var(--accent); color: #fff; }
    .btn-delete { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
    .btn-preview { background: var(--bg); color: var(--muted); border: 1px solid var(--border); }
    .btn-preview.active { color: var(--accent); border-color: var(--accent); }

    .tags-row {
      padding: 8px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      background: var(--surface);
    }

    .tag-input {
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 12px;
      outline: none;
      min-width: 100px;
    }
    .tag-input::placeholder { color: var(--muted); }

    .tag-remove {
      cursor: pointer;
      margin-left: 2px;
      color: var(--muted);
      font-size: 10px;
    }
    .tag-remove:hover { color: var(--danger); }

    /* ── Content area ── */
    .content-area {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    .md-editor {
      flex: 1;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      border: none;
      resize: none;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 14px;
      line-height: 1.7;
      outline: none;
    }
    .md-editor::placeholder { color: var(--muted); }

    .md-preview {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      background: var(--bg);
      border-left: 1px solid var(--border);
      display: none;
    }
    .md-preview.visible { display: block; }
    .md-preview::-webkit-scrollbar { width: 4px; }
    .md-preview::-webkit-scrollbar-thumb { background: var(--border); }

    /* Markdown rendered styles */
    .md-preview h1,.md-preview h2,.md-preview h3 { margin: 1em 0 .4em; font-weight: 600; }
    .md-preview h1 { font-size: 1.5em; }
    .md-preview h2 { font-size: 1.25em; }
    .md-preview p { margin-bottom: .8em; line-height: 1.7; }
    .md-preview code {
      background: var(--surface);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
      font-size: .9em;
      color: #a8d5a2;
    }
    .md-preview pre {
      background: var(--surface);
      padding: 14px;
      border-radius: 8px;
      overflow-x: auto;
      margin-bottom: .8em;
    }
    .md-preview pre code { background: none; padding: 0; }
    .md-preview blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 14px;
      color: var(--muted);
      margin-bottom: .8em;
    }
    .md-preview ul,.md-preview ol { padding-left: 1.4em; margin-bottom: .8em; }
    .md-preview li { margin-bottom: .3em; }
    .md-preview a { color: var(--accent); }
    .md-preview hr { border: none; border-top: 1px solid var(--border); margin: 1em 0; }

    /* ── Welcome / loading state ── */
    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--muted);
    }
    .welcome h2 { font-size: 16px; font-weight: 500; }
    .welcome p { font-size: 13px; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity .2s, transform .2s;
      pointer-events: none;
      z-index: 100;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.ok { background: #2a4a2e; color: #7fd887; }
    #toast.err { background: #4a2a2a; color: #e07070; }

    /* ── Loader ── */
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .6s linear infinite;
      margin: 40px auto;
      display: block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .status-bar {
      padding: 6px 20px;
      font-size: 11px;
      color: var(--muted);
      background: var(--surface);
      border-top: 1px solid var(--border);
    }
  nav { display: flex; align-items: center; gap: 8px; padding: 12px 24px; background: var(--surface); border-bottom: 1px solid var(--border); }
  nav a { color: var(--muted); text-decoration: none; font-size: 13px; padding: 4px 10px; border-radius: 6px; transition: color .15s, background .15s; }
  nav a:hover { color: var(--text); background: rgba(255,255,255,.05); }
  nav a.active { color: var(--accent); }
  .nav-logo { font-weight: 700; color: var(--accent); font-size: 15px; margin-right: 8px; text-decoration: none; }
  .app { height: calc(100vh - 45px); }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="/index.html">STU</a>
  <a href="/notes.html" class="active">📝 노트</a>
  <a href="/curriculum.html">🎓 커리큘럼</a>
  <a href="/chat.html">💬 AI 튜터</a>
  <a href="/papers.html">📄 논문</a>
  <a href="/feed.html">📰 피드</a>
</nav>

<div class="app">
  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1>📝 내 노트</h1>
      <input class="search-box" id="searchInput" type="text" placeholder="노트 검색..." />
      <button class="new-btn" id="newBtn">+ 새 노트</button>
    </div>
    <div class="note-list" id="noteList">
      <span class="spinner"></span>
    </div>
  </aside>

  <!-- ── Editor ── -->
  <main class="editor-panel" id="editorPanel">
    <div class="welcome" id="welcomeView">
      <h2>노트를 선택하거나 새로 만드세요</h2>
      <p>왼쪽 목록에서 노트를 클릭하거나 <strong>+ 새 노트</strong>를 눌러 시작하세요.</p>
    </div>

    <div id="editorView" style="display:none; flex:1; flex-direction:column; overflow:hidden; display:none;">
      <div class="editor-toolbar">
        <input class="title-input" id="titleInput" placeholder="제목을 입력하세요" />
        <div class="toolbar-actions">
          <button class="btn btn-preview" id="previewBtn">미리보기</button>
          <button class="btn btn-save" id="saveBtn">저장</button>
          <button class="btn btn-delete" id="deleteBtn">삭제</button>
        </div>
      </div>

      <div class="tags-row" id="tagsRow">
        <!-- tags rendered here -->
        <input class="tag-input" id="tagInput" placeholder="태그 입력 후 Enter" />
      </div>

      <div class="content-area">
        <textarea class="md-editor" id="mdEditor" placeholder="마크다운으로 작성하세요..."></textarea>
        <div class="md-preview" id="mdPreview"></div>
      </div>

      <div class="status-bar" id="statusBar">새 노트</div>
    </div>
  </main>
</div>

<div id="toast"></div>

<script>
const API = '/api/v1/notes';

// ── State ─────────────────────────────────────────────────────────
let notes = [];
let currentId = null;   // null = new note
let isDirty = false;
let searchTimer = null;
let currentTags = [];

// ── DOM refs ──────────────────────────────────────────────────────
const noteList    = document.getElementById('noteList');
const searchInput = document.getElementById('searchInput');
const newBtn      = document.getElementById('newBtn');
const welcomeView = document.getElementById('welcomeView');
const editorView  = document.getElementById('editorView');
const titleInput  = document.getElementById('titleInput');
const mdEditor    = document.getElementById('mdEditor');
const mdPreview   = document.getElementById('mdPreview');
const saveBtn     = document.getElementById('saveBtn');
const deleteBtn   = document.getElementById('deleteBtn');
const previewBtn  = document.getElementById('previewBtn');
const tagsRow     = document.getElementById('tagsRow');
const tagInput    = document.getElementById('tagInput');
const statusBar   = document.getElementById('statusBar');

// ── API helpers ───────────────────────────────────────────────────
async function apiFetch(path, opts = {}) {
  const res = await fetch(API + path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
  });
  if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
  if (res.status === 204) return null;
  return res.json();
}

// ── Toast ─────────────────────────────────────────────────────────
function toast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  setTimeout(() => { el.className = ''; }, 2500);
}

// ── Load note list ────────────────────────────────────────────────
async function loadNotes(q = '') {
  noteList.innerHTML = '<span class="spinner"></span>';
  try {
    const params = q ? `?q=${encodeURIComponent(q)}` : '';
    notes = await apiFetch(`/${params}`);
    renderNoteList();
  } catch (e) {
    noteList.innerHTML = `<div class="empty-state">로드 실패: ${e.message}</div>`;
  }
}

function renderNoteList() {
  if (!notes.length) {
    noteList.innerHTML = '<div class="empty-state">노트가 없습니다</div>';
    return;
  }
  noteList.innerHTML = notes.map(n => `
    <div class="note-item ${n.id === currentId ? 'active' : ''}" data-id="${n.id}">
      <div class="note-item-title">${escHtml(n.title || '(제목 없음)')}</div>
      <div class="note-item-meta">
        <span>${fmtDate(n.updated_at)}</span>
      </div>
      ${n.tags?.length ? `<div class="note-item-tags">${n.tags.map(t => `<span class="tag">${escHtml(t)}</span>`).join('')}</div>` : ''}
    </div>
  `).join('');

  noteList.querySelectorAll('.note-item').forEach(el => {
    el.addEventListener('click', () => openNote(el.dataset.id));
  });
}

// ── Open existing note ────────────────────────────────────────────
async function openNote(id) {
  if (isDirty && !confirm('저장하지 않은 내용이 있습니다. 계속할까요?')) return;

  try {
    const note = await apiFetch(`/${id}`);
    currentId   = note.id;
    currentTags = [...(note.tags || [])];
    isDirty     = false;

    titleInput.value = note.title;
    mdEditor.value   = note.content_md;
    renderTags();
    updatePreview();
    showEditor();
    markActive(id);

    const d = new Date(note.updated_at);
    statusBar.textContent = `마지막 저장: ${d.toLocaleString('ko-KR')}`;
  } catch (e) {
    toast(`불러오기 실패: ${e.message}`, 'err');
  }
}

// ── New note ──────────────────────────────────────────────────────
function newNote() {
  if (isDirty && !confirm('저장하지 않은 내용이 있습니다. 계속할까요?')) return;
  currentId   = null;
  currentTags = [];
  isDirty     = false;

  titleInput.value = '';
  mdEditor.value   = '';
  renderTags();
  updatePreview();
  showEditor();
  markActive(null);
  statusBar.textContent = '새 노트';
  titleInput.focus();
}

// ── Save ──────────────────────────────────────────────────────────
async function save() {
  const title = titleInput.value.trim();
  if (!title) { toast('제목을 입력해 주세요', 'err'); titleInput.focus(); return; }

  const body = {
    title,
    content_md: mdEditor.value,
    tags: currentTags,
  };

  try {
    saveBtn.disabled = true;
    let saved;
    if (currentId) {
      saved = await apiFetch(`/${currentId}`, { method: 'PUT', body: JSON.stringify(body) });
    } else {
      saved = await apiFetch('/', { method: 'POST', body: JSON.stringify(body) });
      currentId = saved.id;
    }

    isDirty = false;
    const d = new Date(saved.updated_at);
    statusBar.textContent = `마지막 저장: ${d.toLocaleString('ko-KR')}`;
    toast('저장됐습니다');
    await loadNotes(searchInput.value);
    markActive(currentId);
  } catch (e) {
    toast(`저장 실패: ${e.message}`, 'err');
  } finally {
    saveBtn.disabled = false;
  }
}

// ── Delete ────────────────────────────────────────────────────────
async function deleteNote() {
  if (!currentId) return;
  if (!confirm('이 노트를 삭제할까요?')) return;
  try {
    await apiFetch(`/${currentId}`, { method: 'DELETE' });
    currentId = null;
    isDirty   = false;
    toast('삭제됐습니다');
    hideEditor();
    await loadNotes(searchInput.value);
  } catch (e) {
    toast(`삭제 실패: ${e.message}`, 'err');
  }
}

// ── Tags ──────────────────────────────────────────────────────────
function renderTags() {
  // remove old tag chips (keep input)
  tagsRow.querySelectorAll('.tag').forEach(el => el.remove());
  currentTags.forEach((t, i) => {
    const chip = document.createElement('span');
    chip.className = 'tag';
    chip.innerHTML = `${escHtml(t)}<span class="tag-remove" data-i="${i}">✕</span>`;
    tagsRow.insertBefore(chip, tagInput);
  });
  tagsRow.querySelectorAll('.tag-remove').forEach(btn => {
    btn.addEventListener('click', () => {
      currentTags.splice(+btn.dataset.i, 1);
      renderTags();
      markDirty();
    });
  });
}

tagInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    const val = tagInput.value.trim().replace(/,/g, '');
    if (val && !currentTags.includes(val)) {
      currentTags.push(val);
      renderTags();
      markDirty();
    }
    tagInput.value = '';
  }
  if (e.key === 'Backspace' && !tagInput.value && currentTags.length) {
    currentTags.pop();
    renderTags();
    markDirty();
  }
});

// ── Preview ───────────────────────────────────────────────────────
function updatePreview() {
  mdPreview.innerHTML = marked.parse(mdEditor.value || '');
}

previewBtn.addEventListener('click', () => {
  const on = mdPreview.classList.toggle('visible');
  previewBtn.classList.toggle('active', on);
});

mdEditor.addEventListener('input', () => {
  markDirty();
  updatePreview();
});

titleInput.addEventListener('input', markDirty);

// ── Keyboard shortcut: Ctrl/Cmd+S ────────────────────────────────
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    save();
  }
});

// ── Search ────────────────────────────────────────────────────────
searchInput.addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => loadNotes(searchInput.value), 300);
});

// ── Helpers ───────────────────────────────────────────────────────
function showEditor() {
  welcomeView.style.display = 'none';
  editorView.style.display  = 'flex';
}
function hideEditor() {
  welcomeView.style.display = 'flex';
  editorView.style.display  = 'none';
}
function markActive(id) {
  noteList.querySelectorAll('.note-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);
  });
}
function markDirty() { isDirty = true; }

function fmtDate(iso) {
  const d = new Date(iso);
  const now = new Date();
  const diff = (now - d) / 1000;
  if (diff < 60)     return '방금 전';
  if (diff < 3600)   return `${Math.floor(diff/60)}분 전`;
  if (diff < 86400)  return `${Math.floor(diff/3600)}시간 전`;
  return d.toLocaleDateString('ko-KR');
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── Events ────────────────────────────────────────────────────────
newBtn.addEventListener('click', newNote);
saveBtn.addEventListener('click', save);
deleteBtn.addEventListener('click', deleteNote);

// ── Boot ──────────────────────────────────────────────────────────
loadNotes();
</script>
</body>
</html>
