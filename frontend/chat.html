<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 튜터 — STU</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3a;
      --accent: #7c6af7; --accent-dim: #4e46a0; --text: #e2e4f0; --muted: #7b7f96;
      --user-bg: #252840; --ai-bg: #1a1d27;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; }

    nav { display: flex; align-items: center; gap: 8px; padding: 12px 24px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
    nav a { color: var(--muted); text-decoration: none; font-size: 13px; padding: 4px 10px; border-radius: 6px; transition: color .15s, background .15s; }
    nav a:hover { color: var(--text); background: rgba(255,255,255,.05); }
    nav a.active { color: var(--accent); }
    .nav-logo { font-weight: 700; color: var(--accent); font-size: 15px; margin-right: 8px; text-decoration: none; }

    .toolbar { display: flex; align-items: center; gap: 10px; padding: 10px 20px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .toolbar label { font-size: 12px; color: var(--muted); }
    .toolbar select, .toolbar input {
      background: var(--bg); border: 1px solid var(--border); color: var(--text);
      border-radius: 7px; padding: 5px 10px; font-size: 12px; outline: none;
    }
    .toolbar select:focus, .toolbar input:focus { border-color: var(--accent); }
    .mode-btn { padding: 5px 12px; border-radius: 7px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 12px; cursor: pointer; transition: all .15s; }
    .mode-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .clear-btn { margin-left: auto; padding: 5px 12px; border-radius: 7px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 12px; cursor: pointer; }
    .clear-btn:hover { border-color: #e05c5c; color: #e05c5c; }

    .chat-area { flex: 1; overflow-y: auto; padding: 24px 0; display: flex; flex-direction: column; gap: 0; }
    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-thumb { background: var(--border); }

    .msg { padding: 12px 24px; max-width: 800px; width: 100%; }
    .msg.user { align-self: flex-end; }
    .msg.assistant { align-self: flex-start; }

    .msg-bubble {
      display: inline-block; padding: 12px 16px; border-radius: 12px;
      font-size: 14px; line-height: 1.65; max-width: 680px;
    }
    .msg.user .msg-bubble { background: var(--user-bg); border-radius: 12px 12px 2px 12px; }
    .msg.assistant .msg-bubble { background: var(--ai-bg); border: 1px solid var(--border); border-radius: 12px 12px 12px 2px; width: 100%; }

    .msg-role { font-size: 10px; color: var(--muted); margin-bottom: 5px; }
    .msg.user .msg-role { text-align: right; }

    /* markdown in AI bubble */
    .msg-bubble p { margin-bottom: .6em; }
    .msg-bubble p:last-child { margin-bottom: 0; }
    .msg-bubble code { background: rgba(255,255,255,.08); padding: 2px 5px; border-radius: 4px; font-family: monospace; font-size: .9em; }
    .msg-bubble pre { background: rgba(255,255,255,.06); padding: 12px; border-radius: 8px; overflow-x: auto; margin: .6em 0; }
    .msg-bubble pre code { background: none; padding: 0; }
    .msg-bubble ul, .msg-bubble ol { padding-left: 1.4em; margin-bottom: .6em; }
    .msg-bubble strong { color: #fff; }
    .msg-bubble h1,.msg-bubble h2,.msg-bubble h3 { margin: .8em 0 .4em; font-weight: 600; }

    .typing-dot { display: inline-block; width: 6px; height: 6px; background: var(--muted); border-radius: 50%; animation: blink 1.2s infinite; }
    .typing-dot:nth-child(2) { animation-delay: .2s; }
    .typing-dot:nth-child(3) { animation-delay: .4s; }
    @keyframes blink { 0%,80%,100% { opacity: .2; } 40% { opacity: 1; } }

    .input-area { padding: 16px 24px; background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0; }
    .input-row { display: flex; gap: 10px; align-items: flex-end; max-width: 800px; margin: 0 auto; }
    .msg-input {
      flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text);
      border-radius: 10px; padding: 10px 14px; font-size: 14px; resize: none;
      line-height: 1.5; max-height: 160px; outline: none; font-family: inherit;
    }
    .msg-input:focus { border-color: var(--accent); }
    .msg-input::placeholder { color: var(--muted); }
    .send-btn {
      background: var(--accent); color: #fff; border: none; border-radius: 10px;
      padding: 10px 18px; font-size: 14px; cursor: pointer; font-weight: 600;
      transition: background .15s; flex-shrink: 0;
    }
    .send-btn:hover { background: var(--accent-dim); }
    .send-btn:disabled { opacity: .5; cursor: not-allowed; }

    .welcome { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--muted); }
    .welcome h2 { font-size: 16px; font-weight: 500; color: var(--text); }

    .hint { font-size: 12px; color: var(--muted); text-align: center; margin-top: 4px; max-width: 800px; margin-left: auto; margin-right: auto; }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="/index.html">STU</a>
  <a href="/notes.html">📝 노트</a>
  <a href="/curriculum.html">🎓 커리큘럼</a>
  <a href="/chat.html" class="active">💬 AI 튜터</a>
  <a href="/papers.html">📄 논문</a>
  <a href="/feed.html">📰 피드</a>
</nav>

<div class="toolbar">
  <label>모드</label>
  <button class="mode-btn active" id="modeStudy" data-mode="study">🎓 학습</button>
  <button class="mode-btn" id="modeTest" data-mode="test">📝 시험</button>
  <label style="margin-left:12px">과목</label>
  <select id="subjectSelect">
    <option value="선형대수학">선형대수학</option>
    <option value="머신러닝">머신러닝 (CS229)</option>
    <option value="딥러닝">딥러닝 (CS231n)</option>
    <option value="자연어처리">자연어처리 (CS224n)</option>
    <option value="AI 논문">AI 논문 리뷰</option>
  </select>
  <button class="clear-btn" id="clearBtn">대화 초기화</button>
</div>

<div class="chat-area" id="chatArea">
  <div class="welcome">
    <span style="font-size:40px">💬</span>
    <h2>AI 학습 튜터에게 질문하세요</h2>
    <p>선택한 과목에 대해 자유롭게 질문하거나, 시험 모드로 개념을 점검해보세요.</p>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea class="msg-input" id="msgInput" rows="1" placeholder="질문을 입력하세요… (Shift+Enter 줄바꿈, Enter 전송)"></textarea>
    <button class="send-btn" id="sendBtn">전송</button>
  </div>
  <div class="hint">Enter로 전송 · Shift+Enter 줄바꿈</div>
</div>

<script>
const chatArea  = document.getElementById('chatArea');
const msgInput  = document.getElementById('msgInput');
const sendBtn   = document.getElementById('sendBtn');

let history = [];   // [{role, content}]
let mode    = 'study';
let streaming = false;

// ── Mode / subject ────────────────────────────────────────────────
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    mode = btn.dataset.mode;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b === btn));
  });
});

document.getElementById('clearBtn').addEventListener('click', () => {
  if (!confirm('대화를 초기화할까요?')) return;
  history = [];
  chatArea.innerHTML = `<div class="welcome">
    <span style="font-size:40px">💬</span>
    <h2>AI 학습 튜터에게 질문하세요</h2>
    <p>선택한 과목에 대해 자유롭게 질문하거나, 시험 모드로 개념을 점검해보세요.</p>
  </div>`;
});

// ── Auto-resize textarea ──────────────────────────────────────────
msgInput.addEventListener('input', () => {
  msgInput.style.height = 'auto';
  msgInput.style.height = Math.min(msgInput.scrollHeight, 160) + 'px';
});

msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
sendBtn.addEventListener('click', send);

// ── Send ──────────────────────────────────────────────────────────
async function send() {
  const text = msgInput.value.trim();
  if (!text || streaming) return;

  // clear welcome
  chatArea.querySelector('.welcome')?.remove();

  const subject = document.getElementById('subjectSelect').value;

  appendMsg('user', text);
  history.push({ role: 'user', content: text });
  msgInput.value = '';
  msgInput.style.height = 'auto';

  const aiBubble = appendMsg('assistant', '');
  const contentEl = aiBubble.querySelector('.msg-bubble');
  contentEl.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';

  streaming = true;
  sendBtn.disabled = true;

  let fullText = '';
  try {
    const res = await fetch('/api/v1/chat/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mode, subject, message: text, history: history.slice(0, -1) }),
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const raw = line.slice(6).trim();
        if (raw === '[DONE]') break;
        try {
          const { text: chunk } = JSON.parse(raw);
          fullText += chunk;
          contentEl.innerHTML = marked.parse(fullText);
          chatArea.scrollTop = chatArea.scrollHeight;
        } catch {}
      }
    }
    history.push({ role: 'assistant', content: fullText });
  } catch (e) {
    contentEl.textContent = `오류: ${e.message}`;
  } finally {
    streaming = false;
    sendBtn.disabled = false;
    chatArea.scrollTop = chatArea.scrollHeight;
  }
}

// ── Append message ────────────────────────────────────────────────
function appendMsg(role, text) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `
    <div class="msg-role">${role === 'user' ? '나' : '🤖 AI 튜터'}</div>
    <div class="msg-bubble">${role === 'user' ? esc(text) : marked.parse(text)}</div>
  `;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
  return div;
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
