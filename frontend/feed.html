<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>테크 피드 — STU</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3a;
      --accent: #7c6af7; --text: #e2e4f0; --muted: #7b7f96;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

    nav { display: flex; align-items: center; gap: 8px; padding: 12px 24px; background: var(--surface); border-bottom: 1px solid var(--border); }
    nav a { color: var(--muted); text-decoration: none; font-size: 13px; padding: 4px 10px; border-radius: 6px; transition: color .15s, background .15s; }
    nav a:hover { color: var(--text); background: rgba(255,255,255,.05); }
    nav a.active { color: var(--accent); }
    .nav-logo { font-weight: 700; color: var(--accent); font-size: 15px; margin-right: 8px; text-decoration: none; }

    .toolbar { display: flex; align-items: center; gap: 8px; padding: 12px 24px; background: var(--surface); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
    .filter-btn { padding: 5px 13px; border-radius: 7px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 12px; cursor: pointer; transition: all .15s; }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .count-label { font-size: 12px; color: var(--muted); margin-left: auto; }
    .crawl-btn { padding: 6px 13px; background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 7px; font-size: 12px; cursor: pointer; transition: all .15s; }
    .crawl-btn:hover { border-color: var(--accent); color: var(--accent); }

    .content { padding: 20px 24px; max-width: 960px; margin: 0 auto; }

    .source-section { margin-bottom: 32px; }
    .source-heading { font-size: 12px; font-weight: 600; color: var(--muted); letter-spacing: .8px; text-transform: uppercase; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }

    .feed-item {
      display: flex; gap: 14px; padding: 14px 0;
      border-bottom: 1px solid rgba(42,45,58,.6);
    }
    .feed-item:last-child { border-bottom: none; }

    .feed-source-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; margin-top: 6px; }
    .feed-source-dot.bigtech { background: #4caf7d; }
    .feed-source-dot.korean  { background: #f5a623; }

    .feed-body { flex: 1; min-width: 0; }
    .feed-source { font-size: 11px; color: var(--muted); margin-bottom: 3px; }
    .feed-title { font-size: 14px; font-weight: 500; line-height: 1.4; }
    .feed-title a { color: var(--text); text-decoration: none; }
    .feed-title a:hover { color: var(--accent); }
    .feed-summary { font-size: 12px; color: var(--muted); line-height: 1.55; margin-top: 5px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .feed-meta { display: flex; gap: 10px; align-items: center; margin-top: 6px; }
    .feed-date { font-size: 11px; color: var(--muted); }
    .feed-tags { display: flex; gap: 4px; flex-wrap: wrap; }
    .tag { background: rgba(124,106,247,.15); color: var(--accent); font-size: 10px; padding: 2px 6px; border-radius: 4px; }

    .spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; margin: 60px auto; display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty { padding: 60px; text-align: center; color: var(--muted); font-size: 14px; line-height: 1.8; }

    .load-more { display: block; width: 100%; margin: 20px 0; padding: 10px; background: var(--surface); border: 1px solid var(--border); color: var(--muted); border-radius: 8px; cursor: pointer; font-size: 13px; text-align: center; transition: all .15s; }
    .load-more:hover { border-color: var(--accent); color: var(--accent); }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="/index.html">STU</a>
  <a href="/notes.html">📝 노트</a>
  <a href="/curriculum.html">🎓 커리큘럼</a>
  <a href="/chat.html">💬 AI 튜터</a>
  <a href="/papers.html">📄 논문</a>
  <a href="/feed.html" class="active">📰 피드</a>
</nav>

<div class="toolbar">
  <button class="filter-btn active" data-type="">전체</button>
  <button class="filter-btn" data-type="personal">👤 개인 연구자</button>
  <button class="filter-btn" data-type="bigtech">🏢 빅테크</button>
  <button class="filter-btn" data-type="korean">🇰🇷 국내</button>
  <span class="count-label" id="countLabel"></span>
  <button class="crawl-btn" id="crawlBtn">블로그 수집</button>
</div>

<div class="content" id="content">
  <span class="spinner"></span>
</div>

<script>
let activeType = '';
let offset = 0;
const LIMIT = 50;
let allItems = [];

async function loadFeed(reset = true) {
  if (reset) { offset = 0; allItems = []; document.getElementById('content').innerHTML = '<span class="spinner"></span>'; }
  try {
    const params = new URLSearchParams({ limit: LIMIT, offset });
    if (activeType) params.set('source_type', activeType);
    const items = await fetch(`/api/v1/feed/?${params}`).then(r => r.json());
    allItems = reset ? items : [...allItems, ...items];
    offset += items.length;
    renderFeed(items.length < LIMIT);
  } catch (e) {
    document.getElementById('content').innerHTML = `<div class="empty">로드 실패: ${e.message}</div>`;
  }
}

function renderFeed(exhausted) {
  const content = document.getElementById('content');
  document.getElementById('countLabel').textContent = `${allItems.length}개`;

  if (!allItems.length) {
    content.innerHTML = '<div class="empty">피드가 없습니다.<br>"블로그 수집"을 실행해 주세요.</div>';
    return;
  }

  // group by source_name
  const groups = {};
  for (const item of allItems) {
    if (!groups[item.source_name]) groups[item.source_name] = { type: item.source_type, items: [] };
    groups[item.source_name].items.push(item);
  }

  let html = '';
  for (const [sourceName, { type, items }] of Object.entries(groups)) {
    html += `<div class="source-section">
      <div class="source-heading">${esc(sourceName)}</div>
      ${items.map(item => `
        <div class="feed-item">
          <div class="feed-source-dot ${esc(type)}"></div>
          <div class="feed-body">
            <div class="feed-source">${esc(item.source_name)}</div>
            <div class="feed-title"><a href="${esc(item.url)}" target="_blank" rel="noopener">${esc(item.title)}</a></div>
            ${item.summary ? `<div class="feed-summary">${esc(item.summary)}</div>` : ''}
            <div class="feed-meta">
              <span class="feed-date">${item.published_at ? fmtDate(item.published_at) : fmtDate(item.fetched_at)}</span>
              ${item.tags?.length ? `<div class="feed-tags">${item.tags.slice(0,5).map(t => `<span class="tag">${esc(t)}</span>`).join('')}</div>` : ''}
            </div>
          </div>
        </div>
      `).join('')}
    </div>`;
  }

  if (!exhausted) html += `<button class="load-more" id="loadMoreBtn">더 보기</button>`;
  content.innerHTML = html;

  document.getElementById('loadMoreBtn')?.addEventListener('click', () => loadFeed(false));
}

// filters
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    activeType = btn.dataset.type;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b === btn));
    loadFeed();
  });
});

// crawl trigger
document.getElementById('crawlBtn').addEventListener('click', async () => {
  const btn = document.getElementById('crawlBtn');
  btn.disabled = true; btn.textContent = '실행 중…';
  try {
    await fetch('/api/v1/crawl/blogs', { method: 'POST' });
    btn.textContent = '시작됨 ✓';
    setTimeout(() => { btn.textContent = '블로그 수집'; btn.disabled = false; loadFeed(); }, 3000);
  } catch { btn.textContent = '실패'; setTimeout(() => { btn.textContent = '블로그 수집'; btn.disabled = false; }, 2000); }
});

function fmtDate(iso) {
  const d = new Date(iso), now = new Date(), diff = (now - d) / 1000;
  if (diff < 60) return '방금 전';
  if (diff < 3600) return `${Math.floor(diff/60)}분 전`;
  if (diff < 86400) return `${Math.floor(diff/3600)}시간 전`;
  if (diff < 86400 * 7) return `${Math.floor(diff/86400)}일 전`;
  return d.toLocaleDateString('ko-KR');
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

loadFeed();
</script>
</body>
</html>
