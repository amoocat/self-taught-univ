# ── Ingress (NGINX) ──────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stu-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/rate-limit: "100"          # req/min per IP
    nginx.ingress.kubernetes.io/rate-limit-burst-multiplier: "5"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "http://localhost:3000"
spec:
  ingressClassName: nginx
  rules:
    - host: stu.local                      # minikube: /etc/hosts에 추가
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: stu-api-svc
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: stu-frontend-svc
                port:
                  number: 80
---
# ── ConfigMap (비민감 설정) ────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: stu-config
data:
  DEBUG: "false"
  ALLOWED_ORIGINS: "http://localhost:3000,http://stu.local"
  DATABASE_URL: "postgresql+asyncpg://stu:stu@stu-postgres-svc:5432/stu"
  REDIS_URL: "redis://stu-redis-svc:6379/0"
---
# ── Secret (민감 정보 — 실제로는 base64 인코딩) ─────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: stu-secrets
type: Opaque
stringData:
  ANTHROPIC_API_KEY: "your-api-key-here"
  SECRET_KEY: "your-secret-key-here"
