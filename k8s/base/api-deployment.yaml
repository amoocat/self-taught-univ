apiVersion: apps/v1
kind: Deployment
metadata:
  name: stu-api
  labels:
    app: stu-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: stu-api
  template:
    metadata:
      labels:
        app: stu-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: api
          image: yourdockerhub/stu-api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: stu-config
            - secretRef:
                name: stu-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: stu-api-svc
spec:
  selector:
    app: stu-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
