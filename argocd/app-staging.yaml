apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: stu-staging
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/amoocat/self-taught-univ.git
    targetRevision: staging          # staging 브랜치를 감시
    path: k8s/overlays/staging
  destination:
    server: https://kubernetes.default.svc
    namespace: stu-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
