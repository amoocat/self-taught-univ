apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: stu-backend
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/yourname/stu-backend
    targetRevision: main
    path: k8s/base                 # Kustomize 또는 plain YAML

  destination:
    server: https://kubernetes.default.svc
    namespace: stu

  syncPolicy:
    automated:
      prune: true                  # 삭제된 리소스 자동 정리
      selfHeal: true               # 수동 변경 감지 시 자동 복구
    syncOptions:
      - CreateNamespace=true
